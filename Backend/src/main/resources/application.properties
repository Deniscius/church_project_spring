spring.application.name=church_project_spring

server.port=${PORT:8081}

# ===============================
# DATABASE - POSTGRESQL
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/church_project_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SWAGGER / OPENAPI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.jackson.time-zone=Africa/Lome
spring.jpa.properties.hibernate.jdbc.time_zone=Africa/Lome

# ===============================
# JWT (clé Base64 d'au moins 256 bits pour HS256 — à surcharger en prod)
# ===============================
jwt.secret=${JWT_SECRET:c2VjcmV0S2V5c0hvdWxkQmVBdExlYXN0MjU2Qml0c0xvbmc=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}